<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>My Portfolio</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f4f4f9;
      color: #333;
    }

    header {
      background: #4CAF50;
      color: white;
      padding: 20px;
      text-align: center;
    }

    nav {
      margin-top: 10px;
    }

    nav a {
      margin: 0 15px;
      text-decoration: none;
      color: white;
      font-weight: bold;
    }

    section {
      padding: 40px;
      text-align: center;
    }

    .projects {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 20px;
    }

    .project-card {
      background: white;
      border-radius: 10px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.2);
      width: 250px;
      padding: 20px;
      transition: transform 0.3s;
    }

    .project-card:hover {
      transform: scale(1.05);
    }

    footer {
      background: #333;
      color: white;
      text-align: center;
      padding: 15px;
      margin-top: 20px;
    }

    button {
      background: #4CAF50;
      color: white;
      border: none;
      padding: 10px 15px;
      border-radius: 6px;
      cursor: pointer;
      margin-top: 10px;
    }

    button:hover {
      background: #45a049;
    }
  </style>
</head>
<body>

  <header>
    <h1>My Portfolio</h1>
    <nav>
      <a href="#">About</a>
      <a href="#">Projects</a>
      <a href="#">Contact</a>
    </nav>
  </header>

  <section id="about">
    <h2>About Me</h2>
    <p>Hello! my name is P Tamilarasan I’m a Network Engineer passionate about building robust and scalable network solutions.</p>
  </section>

  <section id="projects">
    <h2>My Projects</h2>
    <div class="projects" id="projectList"></div>
  </section>

  <section id="contact">
    <h2>Contact Me</h2>
    <p>Email: tamilarasanp@gmail.com</p>
    <button onclick="showMessage()">Say Hi!</button>
    <p id="message"></p>
  </section>

  <footer>
    <p>&copy; 2026 My Portfolio</p>
  </footer>

  <script>
    // Example projects data
    const projects = [
      { title: "Calculator App", description: "A simple calculator built with JavaScript." },
      { title: "Todo List", description: "A task manager app with local storage." },
      { title: "Weather App", description: "Fetches live weather data using an API." },
      { title: "Elderly deaf transit app", description: "An app for elderly and deaf individuals." }
    ];

    // Render projects dynamically
    const projectList = document.getElementById("projectList");
    projects.forEach(p => {
      const card = document.createElement("div");
      card.className = "project-card";
      card.innerHTML = `<h3>${p.title}</h3><p>${p.description}</p>`;
      projectList.appendChild(card);
    });

    // Contact button interaction
    function showMessage() {
      document.getElementById("message").textContent = "Thanks for visiting my portfolio!";
    }
  </script>

</body>
</html>
